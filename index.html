<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Art Lounge</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Raleway:wght@300&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>The Generative Gallery</h1>
        <p>A collection of visions and prompts.</p>
    </header>

    <div class="gallery" id="gallery">
        
        <div class="art-card">
            <div class="image-frame">
                <img src="your-image-1.jpg" alt="AI Generated Art">
            </div>
            <div class="description-box">
                <p>A celestial landscape where neon rivers flow through obsidian mountains, captured in a dreamlike state.</p>
            </div>
        </div>

        <div class="art-card">
            <div class="image-frame">
                <img src="your-image-2.jpg" alt="AI Generated Art">
            </div>
            </div>

    </div>

</body>
</html>
